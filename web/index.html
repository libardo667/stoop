<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>the stoop</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main>
    <header>
      <h1 id="title">the stoop</h1>
      <p id="prompt" class="prompt">…</p>
      <nav class="tabs">
        <button id="tab-exchange" class="tab is-active" type="button" data-view="exchange">stoop</button>
        <button id="tab-murmur" class="tab" type="button" data-view="murmur">murmur</button>
      </nav>
    </header>

    <section id="view-exchange" class="view">
      <div id="entries" class="entries" aria-live="polite"></div>

      <p id="hint-exchange" class="hint"></p>

      <section class="compose">
        <p id="nudge" class="nudge"></p>
        <form id="leave">
          <textarea id="text" maxlength="280" rows="3"></textarea>
          <div class="row">
            <span id="count" class="count"></span>
            <button id="leave-btn" type="submit">leave it on the stoop</button>
          </div>
          <p id="msg" class="msg" role="status"></p>
        </form>
      </section>
    </section>

    <section id="view-murmur" class="view" hidden>
      <div id="murmur" class="murmur" aria-live="polite"></div>
      <p id="hint-murmur" class="hint"></p>
    </section>

    <footer>
      <p id="footer">made by humans, for the block · no accounts · forgets on purpose</p>
      <p class="keeper-link"><a href="/admin">keeper</a></p>
    </footer>
  </main>
  <script src="/app.js"></script>
</body>
</html>
